services:
  photo-house:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env.production
    depends_on:
      - postgres
  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
